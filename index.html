<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avenya Soaps - Hero Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #12100c; /* Dark baseline fallback */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- Hero Container with Background Image & Glow --- */
        .hero-container {
            position: relative;
            min-height: 100vh;
            width: 100%;
            /* Utilizing the provided image_3c629f.jpg */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)), url('image_3c629f.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Ambient background glow effect */
        .hero-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(212, 163, 89, 0.15) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            animation: ambientGlow 8s ease-in-out infinite alternate;
        }

        @keyframes ambientGlow {
            0% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-48%, -52%) scale(1.1); }
        }

        /* --- Navigation Bar --- */
        .navbar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            padding-bottom: 5px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background-color: #d4a359;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #d4a359;
            text-shadow: 0 0 10px rgba(212, 163, 89, 0.4);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* --- Hero Content Wrap --- */
        .hero-content {
            position: relative;
            z-index: 5;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            align-items: center;
            padding: 0 8% 8% 8%;
            flex-grow: 1;
            gap: 40px;
        }

        /* --- Left Side Text Frame --- */
        .hero-text-side {
            max-width: 650px;
            /* Gentle persistent hover effect for the text block */
            animation: floatingText 6s ease-in-out infinite;
        }

        @keyframes floatingText {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .hero-text-side h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            line-height: 1.2;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5);
        }

        .hero-text-side h1 span.italic-glow {
            font-style: italic;
            color: #f7e7c4;
            text-shadow: 0 0 15px rgba(247, 231, 196, 0.3);
        }

        .hero-text-side p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 40px;
            font-weight: 300;
            text-shadow: 1px 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* --- Interactive Buttons --- */
        .btn-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            position: relative;
            padding: 15px 35px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden; /* Encapsulates the bubbles inside the button context */
        }

        /* Primary Button Style (Shop Collection) */
        .btn-primary {
            background-color: #435b4f;
            color: #ffffff;
            border: 1px solid #435b4f;
        }

        /* Secondary Button Style (Our Story) */
        .btn-secondary {
            background-color: rgba(67, 59, 43, 0.4);
            color: #ffffff;
            border: 1px solid #ffffff;
            backdrop-filter: blur(4px);
        }

        /* Button Hover and Glowing Shadows */
        .btn-primary:hover {
            background-color: #4e6b5c;
            border-color: #5d7e6d;
            box-shadow: 0 0 25px rgba(67, 91, 79, 0.6), inset 0 0 10px rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }

        .btn-secondary:hover {
            background-color: rgba(212, 163, 89, 0.2);
            border-color: #d4a359;
            box-shadow: 0 0 25px rgba(212, 163, 89, 0.4);
            transform: translateY(-3px);
        }

        /* --- CSS Soap Bubble Animation System --- */
        .btn::before, .btn::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.25);
            bottom: -20px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* Distinct bubble sizes and locations */
        .btn::before {
            width: 8px;
            height: 8px;
            left: 30%;
        }
        .btn::after {
            width: 12px;
            height: 12px;
            left: 70%;
        }

        /* Triggering bubble animation cycles dynamically on hover */
        .btn:hover::before {
            opacity: 1;
            animation: floatBubbleUp 1.2s infinite linear;
        }

        .btn:hover::after {
            opacity: 1;
            animation: floatBubbleUp 1.5s infinite linear 0.3s;
        }

        @keyframes floatBubbleUp {
            0% {
                bottom: -10px;
                transform: translateX(0) scale(1);
                opacity: 0.7;
            }
            50% {
                transform: translateX(5px) scale(1.2);
            }
            100% {
                bottom: 100%;
                transform: translateX(-5px) scale(0.8);
                opacity: 0;
            }
        }

        /* --- Right Side Floating Card Graphic --- */
        .hero-graphic-side {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        /* Interactive Card mirroring layout dynamics */
        .floating-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            /* Continuous gentle drift */
            animation: overallFloat 7s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .floating-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(212, 163, 89, 0.4);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 30px rgba(212, 163, 89, 0.2);
        }

        .card-img-wrap {
            width: 100%;
            height: 260px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* Subtle zooming effect inside the wrapper frame */
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .floating-card:hover .card-img-wrap img {
            transform: scale(1.06);
        }

        .card-info {
            margin-top: 15px;
            text-align: center;
        }

        .card-info h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #f7e7c4;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .card-info p {
            font-size: 0.8rem;
            color: #b3b3b3;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes overallFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* --- Responsive Viewports --- */
        @media (max-width: 968px) {
            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
                padding-top: 40px;
            }
            .hero-text-side {
                margin: 0 auto;
            }
            .btn-container {
                justify-content: center;
            }
            .hero-graphic-side {
                justify-content: center;
                margin-top: 20px;
            }
            .hero-text-side h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <a href="#" class="logo">AVENYA</a>
            <ul class="nav-links">
                <li><a href="#">Shop</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Journal</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- Main Hero Grid Structure -->
        <main class="hero-content">
            <!-- Text Content matching image layout -->
            <div class="hero-text-side">
                <h1>HANDMADE SOAPS <br><span class="italic-glow">THAT GLOW WITH</span> <br>NATURE</h1>
                <p>Crafted with passion using pure botanicals, essential oils, and radiant goodness for your skin.</p>
                
                <div class="btn-container">
                    <!-- Buttons equipped with glow effects and dynamic bubble generators inside -->
                    <a href="#" class="btn btn-primary">Shop Collection</a>
                    <a href="#" class="btn btn-secondary">Our Story</a>
                </div>
            </div>

            <!-- Animated floating elements previewing the vibe of image_3c629f.jpg -->
            <div class="hero-graphic-side">
                <div class="floating-card">
                    <div class="card-img-wrap">
                        <img src="image_3c629f.jpg" alt="Avenya Turmeric & Calendula Soap Collage Showcase">
                    </div>
                    <div class="card-info">
                        <h3>Turmeric & Calendula</h3>
                        <p>Artisan Botanicals</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
