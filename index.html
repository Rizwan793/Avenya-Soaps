<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avenya Soaps - Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #12100c; color: white; overflow-x: hidden; }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 10%;
            /* Use your image reference here */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.3)), url('Gemini_Generated_Image_3z3t2i3z3t2i3z3t.png') center/cover;
        }

        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 70% 50%, rgba(184, 134, 11, 0.2), transparent 60%);
            animation: pulseGlow 5s infinite alternate;
        }

        @keyframes pulseGlow { from { opacity: 0.5; } to { opacity: 1; } }

        .content { max-width: 600px; position: relative; z-index: 2; }
        h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; line-height: 1.1; margin-bottom: 20px; }
        h1 span { font-style: italic; color: #d4a359; }
        p { margin-bottom: 30px; line-height: 1.6; opacity: 0.9; }

        .btn {
            padding: 15px 30px; border: 1px solid #fff; color: white; text-decoration: none;
            display: inline-block; transition: 0.4s; position: relative; overflow: hidden;
            margin-right: 15px; border-radius: 2px;
        }

        .btn:hover {
            box-shadow: 0 0 20px #d4a359;
            border-color: #d4a359;
        }

        /* Bubble animation */
        .btn::after {
            content: ''; position: absolute; bottom: -10px; left: 50%;
            width: 8px; height: 8px; background: white; border-radius: 50%;
            opacity: 0; transition: 0.3s;
        }
        .btn:hover::after { animation: bubbleUp 1s infinite; opacity: 1; }
        @keyframes bubbleUp { 0% { bottom: -10px; } 100% { bottom: 100%; } }
    </style>
</head>
<body>
    <div class="hero">
        <div class="content">
            <h1>HANDMADE SOAPS <br><span>THAT GLOW WITH NATURE</span></h1>
            <p>Crafted with passion using pure botanicals, essential oils, and radiant goodness for your skin.</p>
            <a href="#" class="btn">SHOP COLLECTION</a>
            <a href="#" class="btn">OUR STORY</a>
        </div>
    </div>
</body>
</html>
