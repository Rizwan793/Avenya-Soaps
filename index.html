<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avenya Soaps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1c160e; color: #fff; overflow-x: hidden; }
        .hero { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: url('image_3c629f.jpg') center/cover; }
        .hero-text { text-align: center; }
        .btn { padding: 15px 30px; background: #3d5245; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; position: relative; display: inline-block; overflow: hidden; }
        .btn:hover { background: #4e6b5c; transform: translateY(-5px); }
        /* Bubble Animation */
        .btn::after { content: 'o'; position: absolute; bottom: -20px; animation: rise 1.5s infinite; opacity: 0; }
        @keyframes rise { 0% { bottom: -20px; opacity: 1; } 100% { bottom: 100%; opacity: 0; } }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-text">
            <h1>HANDMADE SOAPS</h1>
            <a href="#" class="btn">SHOP COLLECTION</a>
        </div>
    </div>
</body>
</html>
