<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Premium Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo-placeholder {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #fff 0%, #333 100%);
            border-radius: 16px;
            margin: 0 auto 2rem auto;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a3a3a3;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .cta-button {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255,255,255,0.15);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder"></div>
        <h1>Something Incredible is Building</h1>
        <p>A minimalist space designed to showcase premium ideas, sleek aesthetics, and forward-thinking concepts. Stay tuned.</p>
        <a href="#" class="cta-button">Explore More</a>
    </div>

</body>
</html>
