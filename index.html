<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avenya Soaps - Hero Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- Reset & Base --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #1c160e;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- Full Screen Hero --- */
        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            /* Using image_3c629f.jpg as a full bleed background with a rich warm fallback gradient */
            background: linear-gradient(to right, rgba(20, 15, 8, 0.85) 30%, rgba(20, 15, 8, 0.2) 60%, rgba(20, 15, 8, 0.4) 100%), 
                        radial-gradient(circle at 80% 50%, #5c4322 0%, #1c160e 70%),
                        url('image_3c629f.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: backgroundGlow 10s ease-in-out infinite alternate;
        }

        /* Subtle floating movement for the entire background scene */
        @keyframes backgroundGlow {
            0% { background-position: center center; }
            100% { background-position: 51% 49%; }
        }

        /* --- Navbar --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 8%;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .nav-links a {
            color: #e0dcd3;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: #d4a359;
            text-shadow: 0 0 15px rgba(212, 163, 89, 0.6);
        }

        /* --- Hero Content Frame --- */
        .hero-main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            padding: 0 8% 10% 8%;
            position: relative;
            z-index: 5;
        }

        .hero-text {
            max-width: 650px;
            /* Continuous gentle hovering lift for everything inside */
            animation: gentleHover 6s ease-in-out infinite;
        }

        @keyframes gentleHover {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .hero-text h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.8rem;
            line-height: 1.2;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .hero-text h1 span {
            font-style: italic;
            color: #f5e3be;
            text-shadow: 0 0 20px rgba(245, 227, 190, 0.3);
        }

        .hero-text p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #ccc5b9;
            margin-bottom: 45px;
            max-width: 500px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
        }

        /* --- Interactive Buttons --- */
        .btn-group {
            display: flex;
            gap: 25px;
        }

        .btn {
            position: relative;
            padding: 16px 38px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 3px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Shop Collection Button */
        .btn-primary {
            background-color: #3d5245;
            color: #ffffff;
            border: 1px solid #3d5245;
        }

        .btn-primary:hover {
            background-color: #496353;
            border-color: #61826e;
            box-shadow: 0 0 30px rgba(61, 82, 69, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        /* Our Story Button */
        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            border-color: #d4a359;
            box-shadow: 0 0 30px rgba(212, 163, 89, 0.5);
            color: #ffffff;
            transform: translateY(-4px);
        }

        /* --- Bubble Generation System --- */
        .btn .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            bottom: -20px;
            opacity: 0;
        }

        .btn:hover .b1 {
            width: 8px; height: 8px; left: 25%;
            animation: riseUp 1s infinite linear;
        }
        .btn:hover .b2 {
            width: 12px; height: 12px; left: 55%;
            animation: riseUp 1.4s infinite linear 0.2s;
        }
        .btn:hover .b3 {
            width: 6px; height: 6px; left: 80%;
            animation: riseUp 1.2s infinite linear 0.5s;
        }

        @keyframes riseUp {
            0% {
                bottom: -10px;
                transform: translateX(0);
                opacity: 0.8;
            }
            50% {
                transform: translateX(6px);
            }
            100% {
                bottom: 100%;
                transform: translateX(-4px);
                opacity: 0;
            }
        }

        /* Responsive Viewports */
        @media (max-width: 768px) {
            .hero-text h1 { font-size: 2.8rem; }
            .navbar { padding: 30px 5%; }
            .hero-main { padding: 0 5% 15% 5%; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <!-- Premium Navigation -->
        <nav class="navbar">
            <a href="#" class="logo">AVENYA</a>
            <ul class="nav-links">
                <li><a href="#">Shop</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Journal</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- Pure Layout Block -->
        <main class="hero-main">
            <div class="hero-text">
                <h1>HANDMADE SOAPS <br><span>THAT GLOW WITH</span> <br>NATURE</h1>
                <p>Crafted with passion using pure botanicals, essential oils, and radiant goodness for your skin.</p>
                
                <div class="btn-group">
                    <a href="#" class="btn btn-primary">
                        Shop Collection
                        <span class="bubble b1"></span>
                        <span class="bubble b2"></span>
                        <span class="bubble b3"></span>
                    </a>
                    <a href="#" class="btn btn-secondary">
                        Our Story
                        <span class="bubble b1"></span>
                        <span class="bubble b2"></span>
                        <span class="bubble b3"></span>
                    </a>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
